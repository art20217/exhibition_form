  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"8da7c792-d880-4cf3-a7db-564eae95782e\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no\">\n  <style>\n    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }\n    @keyframes spin { to { transform: rotate(360deg); } }\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: -apple-system, \"Segoe UI\", Roboto, \"Noto Sans TC\", sans-serif; background: #F5F6F8; color: #1A1A2E; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100dvh; }\n    input, select, textarea, button { font-family: inherit; font-size: inherit; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ROOT CONTAINER -->\n<div style=\"width: 100vw; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #F5F6F8\">\n\n  <!-- ===== EXHIBITION MODE: LANGUAGE SELECT ===== -->\n  <sc-if value=\"{{ showLangSelect }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #FFFFFF; position: relative; animation: fadeIn 0.3s ease\">\n      <!-- Settings gear (top-right) -->\n      <div style=\"position: absolute; top: 20px; right: 20px; z-index: 10\">\n        <button onclick=\"{{ onOpenPinDialog }}\" style=\"width: 44px; height: 44px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.25; border-radius: 8px\" style-hover=\"opacity: 0.5; background: #F0F0F0\" style-active=\"opacity: 0.7\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#666\" stroke-width=\"2\" stroke-linecap=\"round\"             <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- TAB: Staff Fields -->\n        <sc-if value=\"{{ showAdminStaffFields }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width: 800px; margin: 0 auto\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px\">\n              <div style=\"font-size: 18px; font-weight: 700; color: #1A1A2E\">Staff Note Fields<\u002Fdiv>\n              <button onclick=\"{{ onAddStaffField }}\" style=\"height: 40px; padding: 0 16px; background: #0055B8; color: #FFF; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px\" style-hover=\"background: #004494\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n                Add Field\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <sc-for list=\"{{ adminStaffFields }}\" as=\"af\" hint-placeholder-count=\"3\">\n              <div style=\"background: #FFF; border-radius: 10px; padding: 16px; margin-bottom: 8px; border: 1px solid #E2E8F0; display: flex; gap: 12px; align-items: flex-start\">\n                <div style=\"display: flex; flex-direction: column; gap: 4px; color: #94A3B8; padding-top: 2px; cursor: grab; flex-shrink: 0\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><circle cx=\"9\" cy=\"6\" r=\"1.5\"><\u002Fcircle><circle cx=\"15\" cy=\"6\" r=\"1.5\"><\u002Fcircle><circle cx=\"9\" cy=\"12\" r=\"1.5\"><\u002Fcircle><circle cx=\"15\" cy=\"12\" r=\"1.5\"><\u002Fcircle><circle cx=\"9\" cy=\"18\" r=\"1.5\"><\u002Fcircle><circle cx=\"15\" cy=\"18\" r=\"1.5\"><\u002Fcircle><\u002Fsvg>\n                <\u002Fdiv>\n                <div style=\"flex: 1; min-width: 0\">\n                  <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap\">\n                    <span style=\"font-size: 15px; font-weight: 600; color: #1A1A2E\">{{ af.nameEn }}<\u002Fspan>\n                    <span style=\"font-size: 14px; color: #64748B\">{{ af.nameZh }}<\u002Fspan>\n                    <span style=\"font-size: 12px; padding: 2px 8px; background: #F1F5F9; border-radius: 4px; color: #64748B\">{{ af.type }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ af.hasOptions }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size: 13px; color: #94A3B8; margin-top: 4px\">Options: {{ af.optionsSummary }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"display: flex; gap: 4px; flex-shrink: 0\">\n                  <button onclick=\"{{ af.onMoveUp }}\" style=\"width: 32px; height: 32px; border: 1px solid #E2E8F0; background: #FFF; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748B\" style-hover=\"background: #F1F5F9\">↑<\u002Fbutton>\n                  <button onclick=\"{{ af.onMoveDown }}\" style=\"width: 32px; height: 32px; border: 1px solid #E2E8F0; background: #FFF; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748B\" style-hover=\"background: #F1F5F9\">↓<\u002Fbutton>\n                  <button onclick=\"{{ af.onEdit }}\" style=\"width: 32px; height: 32px; border: 1px solid #E2E8F0; background: #FFF; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748B\" style-hover=\"background: #F1F5F9\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                  <button onclick=\"{{ af.onDelete }}\" style=\"width: 32px; height: 32px; border: 1px solid #FEE2E2; background: #FFF; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #DC2626\" style-hover=\"background: #FEF2F2\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- TAB: Records -->\n        <sc-if value=\"{{ showAdminRecords }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width: 100%; margin: 0 auto\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px\">\n              <div style=\"font-size: 18px; font-weight: 700; color: #1A1A2E\">Records ({{ recordCount }})<\u002Fdiv>\n              <div style=\"display: flex; gap: 8px\">\n                <button onclick=\"{{ onExportCSV }}\" style=\"height: 40px; padding: 0 16px; background: #059669; color: #FFF; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px\" style-hover=\"background: #047857\">\n                  <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline><\u002Fsvg>\n                  Export CSV\n                <\u002Fbutton>\n                <button onclick=\"{{ onClearAllData }}\" style=\"height: 40px; padding: 0 16px; background: #FFF; color: #DC2626; border: 1px solid #FCA5A5; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer\" style-hover=\"background: #FEF2F2\">\n                  Clear All\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ hasRecords }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background: #FFF; border-radius: 10px; border: 1px solid #E2E8F0; overflow-x: auto\">\n                <sc-for list=\"{{ recordHeaders }}\" as=\"hdr\" hint-placeholder-count=\"6\">\n                        <\u002Fsc-for><sc-for list=\"{{ recordRows }}\" as=\"row\" hint-placeholder-count=\"2\">\n                      <\u002Fsc-for><sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"6\">\n                          <\u002Fsc-for><table style=\"width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap\">\n                  <thead>\n                    <tr style=\"background: #F8FAFC\">\n                      <th style=\"padding: 10px 14px; text-align: left; font-weight: 600; color: #475569; border-bottom: 1px solid #E2E8F0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em\">{{ hdr }}<\u002Fth>\n                      \n                      <th style=\"padding: 10px 14px; text-align: left; font-weight: 600; color: #475569; border-bottom: 1px solid #E2E8F0; font-size: 12px\">Actions<\u002Fth>\n                    <\u002Ftr>\n                  <\u002Fthead>\n                  <tbody>\n                    <tr style=\"border-bottom: 1px solid #F1F5F9\" style-hover=\"background: #F9FAFB\">\n                        <td style=\"padding: 10px 14px; color: #334155; max-width: 200px; overflow: hidden; text-overflow: ellipsis\">{{ cell }}<\u002Ftd>\n                        \n                        <td style=\"padding: 10px 14px\">\n                          <button onclick=\"{{ row.onDelete }}\" style=\"color: #DC2626; background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px 8px; border-radius: 4px\" style-hover=\"background: #FEF2F2\">Delete<\u002Fbutton>\n                        <\u002Ftd>\n                      <\u002Ftr>\n                    \n                  <\u002Ftbody>\n                <\u002Ftable>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ noRecords }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"text-align: center; padding: 60px 20px; color: #94A3B8; background: #FFF; border-radius: 10px; border: 1px solid #E2E8F0\">\n                <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"margin-bottom: 12px; opacity: 0.5\"><path d=\"M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z\"><\u002Fpath><polyline points=\"13 2 13 9 20 9\"><\u002Fpolyline><\u002Fsvg>\n                <div style=\"font-size: 15px\">No records yet<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- TAB: Settings -->\n        <sc-if value=\"{{ showAdminSettings }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px\">\n            <!-- Device Name -->\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 16px; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">Device Name<\u002Fdiv>\n              <input type=\"text\" value=\"{{ deviceName }}\" oninput=\"{{ onDeviceNameChange }}\" placeholder=\"e.g. Tablet-A\" style=\"width: 100%; height: 44px; padding: 0 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 15px; outline: none\" style-focus=\"border-color: #0055B8\">\n              <div style=\"font-size: 13px; color: #94A3B8; margin-top: 6px\">Attached to each record for multi-device identification<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- PIN -->\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 16px; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">Admin PIN<\u002Fdiv>\n              <input type=\"text\" value=\"{{ adminPin }}\" oninput=\"{{ onPinChange }}\" maxlength=\"4\" inputmode=\"numeric\" pattern=\"[0-9]*\" style=\"width: 120px; height: 44px; padding: 0 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 20px; letter-spacing: 8px; text-align: center; outline: none\" style-focus=\"border-color: #0055B8\">\n              <div style=\"font-size: 13px; color: #94A3B8; margin-top: 6px\">4-digit PIN to access admin panel<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- GDPR EN -->\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 16px; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">GDPR Consent (English)<\u002Fdiv>\n              <textarea value=\"{{ gdprEn }}\" oninput=\"{{ onGdprEnChange }}\" rows=\"3\" style=\"width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; resize: vertical; line-height: 1.5\" style-focus=\"border-color: #0055B8\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <!-- GDPR ZH -->\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 16px; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">GDPR Consent (中文)<\u002Fdiv>\n              <textarea value=\"{{ gdprZh }}\" oninput=\"{{ onGdprZhChange }}\" rows=\"3\" style=\"width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; resize: vertical; line-height: 1.5\" style-focus=\"border-color: #0055B8\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <div style=\"padding-bottom: 40px\">\n              <button onclick=\"{{ onSaveSettings }}\" style=\"width: 100%; height: 48px; background: #0055B8; color: #FFF; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer\" style-hover=\"background: #004494\">\n                Save Settings\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FIELD EDITOR MODAL ===== -->\n  <sc-if value=\"{{ showFieldEditor }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease; padding: 20px\" onclick=\"{{ onCloseFieldEditor }}\">\n      <div style=\"background: #FFF; border-radius: 16px; width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch\" onclick=\"{{ stopProp }}\">\n        <div style=\"padding: 24px 24px 0\">\n          <div style=\"font-size: 18px; font-weight: 700; color: #1A1A2E; margin-bottom: 20px\">{{ fieldEditorTitle }}<\u002Fdiv>\n\n          <!-- Name EN -->\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 4px\">Field Name (EN)<\u002Flabel>\n            <input type=\"text\" value=\"{{ feNameEn }}\" oninput=\"{{ onFeNameEnChange }}\" placeholder=\"e.g. Country\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none\" style-focus=\"border-color: #0055B8\">\n          <\u002Fdiv>\n\n          <!-- Name ZH -->\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 4px\">Field Name (中文)<\u002Flabel>\n            <input type=\"text\" value=\"{{ feNameZh }}\" oninput=\"{{ onFeNameZhChange }}\" placeholder=\"e.g. 國家\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none\" style-focus=\"border-color: #0055B8\">\n          <\u002Fdiv>\n\n          <!-- Type -->\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 4px\">Type<\u002Flabel>\n            <select value=\"{{ feType }}\" onchange=\"{{ onFeTypeChange }}\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; outline: none; background: #FFF; -webkit-appearance: none\" style-focus=\"border-color: #0055B8\">\n              <option value=\"text\">Text<\u002Foption>\n              <option value=\"email\">Email<\u002Foption>\n              <option value=\"tel\">Phone (with country code)<\u002Foption>\n              <option value=\"select\">Select (dropdown)<\u002Foption>\n              <option value=\"checkbox-group\">Checkbox Group (multi-select)<\u002Foption>\n              <option value=\"textarea\">Textarea<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <!-- Required -->\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none\">\n              <input type=\"checkbox\" checked=\"{{ feRequired }}\" onchange=\"{{ onFeRequiredChange }}\" style=\"width: 18px; height: 18px; accent-color: #0055B8\">\n              <span style=\"font-size: 14px; color: #334155\">Required field<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fdiv>\n\n          <!-- Options (for select / checkbox-group) -->\n          <sc-if value=\"{{ feShowOptions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-bottom: 14px\">\n              <label style=\"display: block; font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 8px\">Options<\u002Flabel>\n              <sc-for list=\"{{ feOptions }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                <div style=\"display: flex; gap: 8px; margin-bottom: 6px; align-items: center\">\n                  <input type=\"text\" value=\"{{ opt.en }}\" oninput=\"{{ opt.onEnChange }}\" placeholder=\"English\" style=\"flex: 1; height: 36px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 13px; outline: none\" style-focus=\"border-color: #0055B8\">\n                  <input type=\"text\" value=\"{{ opt.zh }}\" oninput=\"{{ opt.onZhChange }}\" placeholder=\"中文\" style=\"flex: 1; height: 36px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 13px; outline: none\" style-focus=\"border-color: #0055B8\">\n                  <button onclick=\"{{ opt.onRemove }}\" style=\"width: 28px; height: 28px; border: none; background: #FEF2F2; color: #DC2626; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0\" style-hover=\"background: #FEE2E2\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <button onclick=\"{{ onFeAddOption }}\" style=\"height: 32px; padding: 0 12px; background: #F1F5F9; color: #475569; border: 1px dashed #CBD5E1; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 4px\" style-hover=\"background: #E2E8F0\">+ Add Option<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"padding: 16px 24px 24px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #F1F5F9; margin-top: 8px\">\n          <button onclick=\"{{ onCloseFieldEditor }}\" style=\"height: 40px; padding: 0 20px; border: 1px solid #D1D5DB; background: #FFF; border-radius: 8px; font-size: 14px; color: #64748B; cursor: pointer\" style-hover=\"background: #F9FAFB\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onSaveField }}\" style=\"height: 40px; padding: 0 20px; border: none; background: #0055B8; border-radius: 8px; font-size: 14px; color: #FFF; cursor: pointer; font-weight: 500\" style-hover=\"background: #004494\">Save Field<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== CLEAR DATA CONFIRM DIALOG ===== -->\n  <sc-if value=\"{{ showClearConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease\" onclick=\"{{ onCloseClearConfirm }}\">\n      <div style=\"background: #FFF; border-radius: 16px; padding: 32px; width: 400px; max-width: 90vw; text-align: center\" onclick=\"{{ stopProp }}\">\n        <div style=\"width: 56px; height: 56px; background: #FEF2F2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#DC2626\" stroke-width=\"2\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size: 18px; font-weight: 700; color: #1A1A2E; margin-bottom: 8px\">Delete All Records?<\u002Fdiv>\n        <div style=\"font-size: 14px; color: #64748B; margin-bottom: 20px; line-height: 1.5\">This will permanently delete all {{ recordCount }} records. Type <strong>DELETE<\u002Fstrong> to confirm.<\u002Fdiv>\n        <input type=\"text\" value=\"{{ clearConfirmValue }}\" oninput=\"{{ onClearConfirmInput }}\" placeholder=\"Type &quot;DELETE&quot;\" style=\"width: 100%; height: 44px; padding: 0 14px; border: 2px solid #D1D5DB; border-radius: 8px; font-size: 16px; text-align: center; outline: none; margin-bottom: 16px\" style-focus=\"border-color: #DC2626\">\n        <div style=\"display: flex; gap: 12px\">\n          <button onclick=\"{{ onCloseClearConfirm }}\" style=\"flex: 1; height: 44px; border: 1px solid #D1D5DB; background: #FFF; border-radius: 8px; font-size: 15px; color: #64748B; cursor: pointer\" style-hover=\"background: #F9FAFB\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onConfirmClear }}\" disabled=\"{{ clearConfirmDisabled }}\" style=\"flex: 1; height: 44px; border: none; background: #DC2626; border-radius: 8px; font-size: 15px; color: #FFF; cursor: pointer; font-weight: 500; opacity: {{ clearConfirmOpacity }}\" style-hover=\"background: #B91C1C\">Delete All<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TOAST ===== -->\n  <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #1E293B; color: #FFF; padding: 12px 24px; border-radius: 10px; font-size: 15px; font-weight: 500; z-index: 2000; animation: fadeIn 0.2s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.2)\">\n      {{ toastMessage }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  DB_NAME = 'ExhibitionFormDB';\n  DB_VERSION = 1;\n\n  state = {\n    // Navigation\n    screen: 'langSelect', // langSelect | customerForm | thankYou | staffNotes | admin\n    language: 'en',\n\n    // PIN\n    showPinDialog: false,\n    pinValue: '',\n    pinError: false,\n\n    // Admin\n    adminTab: 'fields', // fields | staffFields | records | settings\n\n    // Config\n    pin: '0000',\n    deviceName: '',\n    gdprEn: 'I consent to the organizer collecting and storing my contact information for the purpose of business follow-up. My data will not be shared with third parties.',\n    gdprZh: '本人同意主辦單位蒐集並儲存本人之聯絡資訊，用於後續商業聯繫。本人資料不會提供予第三方。',\n\n    // Field definitions\n    customerFields: [],\n    staffFields: [],\n\n    // Form state\n    formValues: {},\n    formErrors: {},\n    gdprChecked: false,\n    gdprError: false,\n    selectedCountryCode: '+886',\n\n    // Staff notes state\n    staffValues: {},\n    currentRecordId: null,\n\n    // Records\n    records: [],\n\n    // Field editor\n    showFieldEditor: false,\n    fieldEditorMode: 'add', // add | edit\n    fieldEditorTarget: 'customer', // customer | staff\n    editingFieldId: null,\n    feNameEn: '',\n    feNameZh: '',\n    feType: 'text',\n    feRequired: false,\n    feOptions: [],\n\n    // Clear confirm\n    showClearConfirm: false,\n    clearConfirmValue: '',\n\n    // Toast\n    showToast: false,\n    toastMessage: '',\n\n    // DB ready\n    dbReady: false,\n  };\n\n  db = null;\n\n  getDefaultCustomerFields() {\n    return [\n      { id: 'name', nameEn: 'Name', nameZh: '姓名', type: 'text', required: true, isCore: true, order: 0, options: [] },\n      { id: 'company', nameEn: 'Company', nameZh: '公司', type: 'text', required: true, isCore: true, order: 1, options: [] },\n      { id: 'email', nameEn: 'Email', nameZh: '電子信箱', type: 'email', required: true, isCore: true, order: 2, options: [] },\n      { id: 'phone', nameEn: 'Phone', nameZh: '電話（含國碼）', type: 'tel', required: false, isCore: true, order: 3, options: [] },\n      { id: 'inquiry_type', nameEn: 'Inquiry Type', nameZh: '洽談事由', type: 'checkbox-group', required: false, isCore: true, order: 4, options: [\n        { en: 'Request Quote', zh: '索取報價' },\n        { en: 'Sample Required', zh: '樣品需求' },\n        { en: 'Customization / OEM', zh: '客製化需求' },\n        { en: 'Become a Distributor', zh: '尋求代理' },\n      ]},\n    ];\n  }\n\n  getDefaultStaffFields() {\n    return [\n      { id: 'potential', nameEn: 'Potential', nameZh: '潛力評級', type: 'select', required: false, order: 0, options: [\n        { en: 'A', zh: 'A' },\n        { en: 'B', zh: 'B' },\n        { en: 'C', zh: 'C' },\n      ]},\n      { id: 'product_interest', nameEn: 'Product of Interest', nameZh: '感興趣產品', type: 'checkbox-group', required: false, order: 1, options: [] },\n      { id: 'notes', nameEn: 'Notes', nameZh: '備註', type: 'textarea', required: false, order: 2, options: [] },\n    ];\n  }\n\n  async componentDidMount() {\n    await this.initDB();\n    await this.loadAllData();\n    this.setState({ dbReady: true });\n  }\n\n  initDB() {\n    return new Promise((resolve, reject) => {\n      const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);\n      request.onerror = () => reject(request.error);\n      request.onsuccess = () => { this.db = request.result; resolve(); };\n      request.onupgradeneeded = (e) => {\n        const db = e.target.result;\n        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });\n        if (!db.objectStoreNames.contains('records')) db.createObjectStore('records', { keyPath: 'id' });\n        if (!db.objectStoreNames.contains('fieldDefinitions')) db.createObjectStore('fieldDefinitions', { keyPath: 'key' });\n      };\n    });\n  }\n\n  async dbGet(store, key) {\n    return new Promise((resolve, reject) => {\n      const tx = this.db.transaction(store, 'readonly');\n      const req = tx.objectStore(store).get(key);\n      req.onsuccess = () => resolve(req.result);\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async dbPut(store, value) {\n    return new Promise((resolve, reject) => {\n      const tx = this.db.transaction(store, 'readwrite');\n      const req = tx.objectStore(store).put(value);\n      req.onsuccess = () => resolve();\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async dbGetAll(store) {\n    return new Promise((resolve, reject) => {\n      const tx = this.db.transaction(store, 'readonly');\n      const req = tx.objectStore(store).getAll();\n      req.onsuccess = () => resolve(req.result);\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async dbDelete(store, key) {\n    return new Promise((resolve, reject) => {\n      const tx = this.db.transaction(store, 'readwrite');\n      const req = tx.objectStore(store).delete(key);\n      req.onsuccess = () => resolve();\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async dbClear(store) {\n    return new Promise((resolve, reject) => {\n      const tx = this.db.transaction(store, 'readwrite');\n      const req = tx.objectStore(store).clear();\n      req.onsuccess = () => resolve();\n      req.onerror = () => reject(req.error);\n    });\n  }\n\n  async loadAllData() {\n    // Load config\n    const pinData = await this.dbGet('config', 'pin');\n    const deviceData = await this.dbGet('config', 'deviceName');\n    const gdprEnData = await this.dbGet('config', 'gdprEn');\n    const gdprZhData = await this.dbGet('config', 'gdprZh');\n\n    // Load field defs\n    const custFieldsData = await this.dbGet('fieldDefinitions', 'customerFields');\n    const staffFieldsData = await this.dbGet('fieldDefinitions', 'staffFields');\n\n    // Load records\n    const records = await this.dbGetAll('records');\n\n    const defaultDevice = 'Device-' + Math.random().toString(36).substr(2, 6).toUpperCase();\n\n    this.setState({\n      pin: pinData?.value ?? '0000',\n      deviceName: deviceData?.value ?? defaultDevice,\n      gdprEn: gdprEnData?.value ?? this.state.gdprEn,\n      gdprZh: gdprZhData?.value ?? this.state.gdprZh,\n      customerFields: custFieldsData?.value ?? this.getDefaultCustomerFields(),\n      staffFields: staffFieldsData?.value ?? this.getDefaultStaffFields(),\n      records: records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)),\n    });\n\n    // Save defaults if first run\n    if (!custFieldsData) await this.dbPut('fieldDefinitions', { key: 'customerFields', value: this.getDefaultCustomerFields() });\n    if (!staffFieldsData) await this.dbPut('fieldDefinitions', { key: 'staffFields', value: this.getDefaultStaffFields() });\n    if (!deviceData) await this.dbPut('config', { key: 'deviceName', value: defaultDevice });\n  }\n\n  async saveConfig(key, value) {\n    await this.dbPut('config', { key, value });\n  }\n\n  async saveFieldDefs(key, value) {\n    await this.dbPut('fieldDefinitions', { key, value });\n  }\n\n  showToastMsg(msg) {\n    this.setState({ showToast: true, toastMessage: msg });\n    setTimeout(() => this.setState({ showToast: false }), 2000);\n  }\n\n  generateId() {\n    return 'f_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);\n  }\n\n  generateUUID() {\n    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {\n      const r = Math.random() * 16 | 0;\n      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);\n    });\n  }\n\n  getCountryCodes() {\n    const top = [\n      { value: '+886', label: '+886 TW' },\n      { value: '+86', label: '+86 CN' },\n      { value: '+1', label: '+1 US/CA' },\n      { value: '+44', label: '+44 UK' },\n      { value: '+49', label: '+49 DE' },\n      { value: '+81', label: '+81 JP' },\n      { value: '+82', label: '+82 KR' },\n      { value: '+66', label: '+66 TH' },\n      { value: '+91', label: '+91 IN' },\n    ];\n    const others = [\n      { value: '+7', label: '+7 RU' },\n      { value: '+20', label: '+20 EG' },\n      { value: '+27', label: '+27 ZA' },\n      { value: '+30', label: '+30 GR' },\n      { value: '+31', label: '+31 NL' },\n      { value: '+33', label: '+33 FR' },\n      { value: '+34', label: '+34 ES' },\n      { value: '+36', label: '+36 HU' },\n      { value: '+39', label: '+39 IT' },\n      { value: '+41', label: '+41 CH' },\n      { value: '+43', label: '+43 AT' },\n      { value: '+45', label: '+45 DK' },\n      { value: '+46', label: '+46 SE' },\n      { value: '+47', label: '+47 NO' },\n      { value: '+48', label: '+48 PL' },\n      { value: '+52', label: '+52 MX' },\n      { value: '+55', label: '+55 BR' },\n      { value: '+60', label: '+60 MY' },\n      { value: '+61', label: '+61 AU' },\n      { value: '+62', label: '+62 ID' },\n      { value: '+63', label: '+63 PH' },\n      { value: +$/.test(emailVal)) {\n          errors[f.id] = lang === 'en' ? 'Please enter a valid email.' : '請輸入有效的電子信箱。';\n        }\n      }\n    }\n\n    if (!gdprChecked) {\n      this.setState({ formErrors: errors, gdprError: true });\n      if (Object.keys(errors).length > 0) return;\n      return;\n    }\n\n    if (Object.keys(errors).length > 0) {\n      this.setState({ formErrors: errors });\n      return;\n    }\n\n    // Build customer field values, attach country code to phone\n    const customerFieldValues = { ...formValues };\n    const phoneField = customerFields.find(f => f.type === 'tel');\n    if (phoneField && customerFieldValues[phoneField.id]) {\n      customerFieldValues[phoneField.id] = selectedCountryCode + ' ' + customerFieldValues[phoneField.id];\n    }\n\n    const record = {\n      id: this.generateUUID(),\n      timestamp: new Date().toISOString(),\n      device: this.state.deviceName,\n      language: language === 'zh-TW' ? 'zh-TW' : 'en',\n      customerFields: customerFieldValues,\n      staffFields: {},\n      gdprConsent: true,\n    };\n\n    this.dbPut('records', record).then(() => {\n      this.setState({\n        records: [record, ...this.state.records],\n        currentRecordId: record.id,\n        screen: 'thankYou',\n        staffValues: {},\n      });\n\n      // Auto-advance after 2 seconds\n      this._thankYouTimer = setTimeout(() => {\n        if (this.state.screen === 'thankYou') {\n          this.setState({ screen: 'staffNotes' });\n        }\n      }, 2000);\n    });\n  }\n\n  async saveStaffNotes() {\n    const { currentRecordId, staffValues, records } = this.state;\n    const updated = records.map(r => {\n      if (r.id === currentRecordId) return { ...r, staffFields: { ...staffValues } };\n      return r;\n    });\n    const record = updated.find(r => r.id === currentRecordId);\n    if (record) await this.dbPut('records', record);\n    this.setState({ records: updated, screen: 'langSelect', staffValues: {}, currentRecordId: null });\n    this.showToastMsg('Saved!');\n  }\n\n  openFieldEditor(mode, target, field) {\n    this.setState({\n      showFieldEditor: true,\n      fieldEditorMode: mode,\n      fieldEditorTarget: target,\n      editingFieldId: field?.id ?? null,\n      feNameEn: field?.nameEn ?? '',\n      feNameZh: field?.nameZh ?? '',\n      feType: field?.type ?? 'text',\n      feRequired: field?.required ?? false,\n      feOptions: field?.options ? field.options.map(o => ({ ...o })) : [],\n    });\n  }\n\n  async saveField() {\n    const { fieldEditorMode, fieldEditorTarget, editingFieldId, feNameEn, feNameZh, feType, feRequired, feOptions } = this.state;\n    if (!feNameEn.trim()) { this.showToastMsg('English name is required'); return; }\n\n    const stateKey = fieldEditorTarget === 'customer' ? 'customerFields' : 'staffFields';\n    const dbKey = fieldEditorTarget === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = [...this.state[stateKey]];\n\n    const cleanedOptions = feOptions.filter(o => o.en.trim() || o.zh.trim()).map(o => ({ en: o.en.trim(), zh: o.zh.trim() || o.en.trim() }));\n\n    if (fieldEditorMode === 'add') {\n      const maxOrder = fields.length > 0 ? Math.max(...fields.map(f => f.order)) : -1;\n      fields.push({\n        id: this.generateId(),\n        nameEn: feNameEn.trim(),\n        nameZh: feNameZh.trim() || feNameEn.trim(),\n        type: feType,\n        required: feRequired,\n        isCore: false,\n        order: maxOrder + 1,\n        options: cleanedOptions,\n      });\n    } else {\n      fields = fields.map(f => {\n        if (f.id === editingFieldId) {\n          return { ...f, nameEn: feNameEn.trim(), nameZh: feNameZh.trim() || feNameEn.trim(), type: feType, required: feRequired, options: cleanedOptions };\n        }\n        return f;\n      });\n    }\n\n    await this.saveFieldDefs(dbKey, fields);\n    this.setState({ [stateKey]: fields, showFieldEditor: false });\n    this.showToastMsg(fieldEditorMode === 'add' ? 'Field added' : 'Field updated');\n  }\n\n  async deleteField(target, fieldId) {\n    const stateKey = target === 'customer' ? 'customerFields' : 'staffFields';\n    const dbKey = target === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = this.state[stateKey].filter(f => f.id !== fieldId);\n    // Re-order\n    fields = fields.sort((a, b) => a.order - b.order).map((f, i) => ({ ...f, order: i }));\n    await this.saveFieldDefs(dbKey, fields);\n    this.setState({ [stateKey]: fields });\n    this.showToastMsg('Field deleted');\n  }\n\n  async moveField(target, fieldId, direction) {\n    const stateKey = target === 'customer' ? 'customerFields' : 'staffFields';\n    const dbKey = target === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = [...this.state[stateKey]].sort((a, b) => a.order - b.order);\n    const idx = fields.findIndex(f => f.id === fieldId);\n    if (idx < 0) return;\n    const newIdx = idx + direction;\n    if (newIdx < 0 || newIdx >= fields.length) return;\n    [fields[idx], fields[newIdx]] = [fields[newIdx], fields[idx]];\n    fields = fields.map((f, i) => ({ ...f, order: i }));\n    await this.saveFieldDefs(dbKey, fields);\n    this.setState({ [stateKey]: fields });\n  }\n\n  async deleteRecord(id) {\n    await this.dbDelete('records', id);\n    this.setState({ records: this.state.records.filter(r => r.id !== id) });\n    this.showToastMsg('Record deleted');\n  }\n\n  async clearAllRecords() {\n    if (this.state.clearConfirmValue !== 'DELETE') return;\n    await this.dbClear('records');\n    this.setState({ records: [], showClearConfirm: false, clearConfirmValue: '' });\n    this.showToastMsg('All records cleared');\n  }\n\n  async saveSettings() {\n    await this.saveConfig('pin', this.state.pin);\n    await this.saveConfig('deviceName', this.state.deviceName);\n    await this.saveConfig('gdprEn', this.state.gdprEn);\n    await this.saveConfig('gdprZh', this.state.gdprZh);\n    this.showToastMsg('Settings saved');\n  }\n\n  exportCSV() {\n    const { customerFields, staffFields, records } = this.state;\n    const allFields = [...customerFields.sort((a, b) => a.order - b.order), ...staffFields.sort((a, b) => a.order - b.order)];\n\n    const headers = ['ID', 'Timestamp', 'Device', 'Language', ...allFields.map(f => f.nameEn), 'GDPR Consent'];\n\n    const escapeCSV = (val) => {\n      const str = String(val ?? '');\n      if (str.includes(',') || str.includes('\"') || str.includes('\\n')) {\n        return '\"' + str.replace(/\"/g, '\"\"') + '\"';\n      }\n      return str;\n    };\n\n    const rows = records.map(r => {\n      const vals = [\n        r.id,\n        r.timestamp,\n        r.device || '',\n        r.language || '',\n        ...allFields.map(f => {\n          const isCustomer = customerFields.find(cf => cf.id === f.id);\n          const val = isCustomer ? r.customerFields?.[f.id] : r.staffFields?.[f.id];\n          if (Array.isArray(val)) return val.join('; ');\n          return val ?? '';\n        }),\n        r.gdprConsent ? 'Yes' : 'No',\n      ];\n      return vals.map(escapeCSV).join(',');\n    });\n\n    const csv = '\\uFEFF' + headers.map(escapeCSV).join(',') + '\\n' + rows.join('\\n');\n    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = `exhibition_records_${new Date().toISOString().slice(0, 10)}.csv`;\n    a.click();\n    URL.revokeObjectURL(url);\n    this.showToastMsg('CSV exported');\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
