document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"e5b64cd5-5cfb-4c78-8432-d0da8ffc901f\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover\">\n  <style>\n    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n    @keyframes spin { to { transform: rotate(360deg); } }\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    html { font-size: 16px; }\n    body {\n      font-family: -apple-system, \"Segoe UI\", Roboto, \"Noto Sans TC\", sans-serif;\n      background: #F5F6F8; color: #1A1A2E;\n      -webkit-tap-highlight-color: transparent;\n      overflow: hidden;\n      height: 100vh; height: 100dvh;\n      padding-top: env(safe-area-inset-top);\n      padding-bottom: env(safe-area-inset-bottom);\n      padding-left: env(safe-area-inset-left);\n      padding-right: env(safe-area-inset-right);\n    }\n    input, select, textarea, button { font-family: inherit; font-size: 1rem; }\n    @media (max-width: 768px) {\n      [data-mobile-stack] { flex-direction: column !important; }\n      [data-mobile-stack] > * { width: 100% !important; flex: unset !important; }\n      [data-mobile-full] { width: 100% !important; }\n      [data-mobile-pad] { padding-left: 1rem !important; padding-right: 1rem !important; }\n      [data-lang-btns] { flex-direction: column !important; gap: 16px !important; align-items: center !important; }\n      [data-lang-btns] > button { width: 100% !important; max-width: 320px !important; }\n      [data-cb-wrap] { flex-direction: column !important; }\n      [data-cb-wrap] > label { width: 100% !important; }\n      [data-form-actions] { flex-direction: column !important; }\n      [data-form-actions] > button, [data-form-actions] > label { flex: unset !important; width: 100% !important; min-height: 52px !important; }\n    }\n    @media (max-width: 768px) {\n      select {\n        -webkit-appearance: menulist-button !important;\n        appearance: menulist-button !important;\n        background-color: #FFFFFF !important;\n        background-image: none !important;\n        background-repeat: no-repeat !important;\n        background-position: right 12px center !important;\n        background-size: 18px 18px !important;\n        border-radius: 8px !important;\n        color: #1A1A2E !important;\n        -webkit-text-fill-color: #1A1A2E !important;\n        opacity: 1 !important;\n        line-height: normal !important;\n        padding-right: 40px !important;\n      }\n      select option {\n        background-color: #FFFFFF !important;\n        color: #1A1A2E !important;\n      }\n    }\n    @media (min-width: 769px) {\n      select { -webkit-appearance: none; appearance: none; }\n    }\n  <\u002Fstyle>\n  <script src=\"74c35157-2f44-49be-b39b-6a50392a0b20\"><\u002Fscript>\n<\u002Fhelmet>\n\n<!-- ROOT -->\n<div style=\"width: 100vw; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #F5F6F8\">\n\n  <!-- ===== LANGUAGE SELECT ===== -->\n  <sc-if value=\"{{ showLangSelect }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #FFFFFF; position: relative; animation: fadeIn 0.3s ease; padding: 1.5rem\">\n      <div style=\"position: absolute; top: 20px; right: 20px; z-index: 10\">\n        <button onclick=\"{{ onOpenPinDialog }}\" style=\"width: 44px; height: 44px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.25; border-radius: 8px\" style-hover=\"opacity: 0.5; background: #F0F0F0\" style-active=\"opacity: 0.7\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#666\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-bottom: 48px; text-align: center\">\n        <div style=\"width: 72px; height: 72px; background: #0055B8; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FFF\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2\"><\u002Fpath><rect x=\"8\" y=\"2\" width=\"8\" height=\"4\" rx=\"1\" ry=\"1\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size: 1.125rem; font-weight: 600; color: #64748B; letter-spacing: 0.05em; text-transform: uppercase\">Exhibition Registration<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-lang-btns=\"\" style=\"display: flex; gap: 24px\">\n        <button onclick=\"{{ onSelectEnglish }}\" style=\"width: 220px; height: 72px; border: 2px solid #D1D5DB; background: #FFF; border-radius: 12px; font-size: 1.375rem; font-weight: 600; color: #1A1A2E; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s\" style-hover=\"border-color g: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 1rem; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">Device Name<\u002Fdiv>\n              <input type=\"text\" value=\"{{ deviceName }}\" oninput=\"{{ onDeviceNameChange }}\" placeholder=\"e.g. Tablet-A\" style=\"width: 100%; height: 44px; padding: 0 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.9375rem; outline: none\" style-focus=\"border-color: #0055B8\">\n              <div style=\"font-size: 0.8125rem; color: #94A3B8; margin-top: 6px\">Attached to each record for multi-device identification<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 1rem; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">Admin PIN<\u002Fdiv>\n              <input type=\"text\" value=\"{{ adminPin }}\" oninput=\"{{ onPinChange }}\" maxlength=\"4\" inputmode=\"numeric\" pattern=\"[0-9]*\" style=\"width: 120px; height: 44px; padding: 0 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 1.25rem; letter-spacing: 8px; text-align: center; outline: none\" style-focus=\"border-color: #0055B8\">\n              <div style=\"font-size: 0.8125rem; color: #94A3B8; margin-top: 6px\">4-digit PIN to access admin panel<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 1rem; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">GDPR Consent (English)<\u002Fdiv>\n              <textarea value=\"{{ gdprEn }}\" oninput=\"{{ onGdprEnChange }}\" rows=\"3\" style=\"width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.875rem; outline: none; resize: vertical; line-height: 1.5\" style-focus=\"border-color: #0055B8\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"background: #FFF; border-radius: 10px; padding: 20px; border: 1px solid #E2E8F0\">\n              <div style=\"font-size: 1rem; font-weight: 700; color: #1A1A2E; margin-bottom: 12px\">GDPR Consent (中文)<\u002Fdiv>\n              <textarea value=\"{{ gdprZh }}\" oninput=\"{{ onGdprZhChange }}\" rows=\"3\" style=\"width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.875rem; outline: none; resize: vertical; line-height: 1.5\" style-focus=\"border-color: #0055B8\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"padding-bottom: 40px\">\n              <button onclick=\"{{ onSaveSettings }}\" style=\"width: 100%; height: 48px; background: #0055B8; color: #FFF; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer\" style-hover=\"background: #004494\">Save Settings<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FIELD EDITOR MODAL ===== -->\n  <sc-if value=\"{{ showFieldEditor }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease; padding: 20px\" onclick=\"{{ onCloseFieldEditor }}\">\n      <div style=\"background: #FFF; border-radius: 16px; width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch\" onclick=\"{{ stopProp }}\">\n        <div style=\"padding: 24px 24px 0\">\n          <div style=\"font-size: 1.125rem; font-weight: 700; color: #1A1A2E; margin-bottom: 20px\">{{ fieldEditorTitle }}<\u002Fdiv>\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 0.8125rem; font-weight: 600; color: #64748B; margin-bottom: 4px\">Field Name (EN)<\u002Flabel>\n            <input type=\"text\" value=\"{{ feNameEn }}\" oninput=\"{{ onFeNameEnChange }}\" placeholder=\"e.g. Country\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.875rem; outline: none\" style-focus=\"border-color: #0055B8\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 0.8125rem; font-weight: 600; color: #64748B; margin-bottom: 4px\">Field Name (中文)<\u002Flabel>\n            <input type=\"text\" value=\"{{ feNameZh }}\" oninput=\"{{ onFeNameZhChange }}\" placeholder=\"e.g. 國家\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.875rem; outline: none\" style-focus=\"border-color: #0055B8\">\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: block; font-size: 0.8125rem; font-weight: 600; color: #64748B; margin-bottom: 4px\">Type<\u002Flabel>\n            <select value=\"{{ feType }}\" onchange=\"{{ onFeTypeChange }}\" style=\"width: 100%; height: 40px; padding: 0 12px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 0.875rem; outline: none; background: #FFF\" style-focus=\"border-color: #0055B8\">\n              <option value=\"text\">Text<\u002Foption><option value=\"email\">Email<\u002Foption><option value=\"tel\">Phone (with country code)<\u002Foption><option value=\"select\">Select (dropdown)<\u002Foption><option value=\"checkbox-group\">Checkbox Group (multi-select)<\u002Foption><option value=\"textarea\">Textarea<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div style=\"margin-bottom: 14px\">\n            <label style=\"display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none\">\n              <input type=\"checkbox\" checked=\"{{ feRequired }}\" onchange=\"{{ onFeRequiredChange }}\" style=\"width: 18px; height: 18px; accent-color: #0055B8\">\n              <span style=\"font-size: 0.875rem; color: #334155\">Required field<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fdiv>\n          <sc-if value=\"{{ feShowOptions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-bottom: 14px\">\n              <label style=\"display: block; font-size: 0.8125rem; font-weight: 600; color: #64748B; margin-bottom: 8px\">Options<\u002Flabel>\n              <sc-for list=\"{{ feOptions }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                <div style=\"display: flex; gap: 8px; margin-bottom: 6px; align-items: center\">\n                  <input type=\"text\" value=\"{{ opt.en }}\" oninput=\"{{ opt.onEnChange }}\" placeholder=\"English\" style=\"flex: 1; height: 36px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 0.8125rem; outline: none\" style-focus=\"border-color: #0055B8\">\n                  <input type=\"text\" value=\"{{ opt.zh }}\" oninput=\"{{ opt.onZhChange }}\" placeholder=\"中文\" style=\"flex: 1; height: 36px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 0.8125rem; outline: none\" style-focus=\"border-color: #0055B8\">\n                  <button onclick=\"{{ opt.onRemove }}\" style=\"width: 28px; height: 28px; border: none; background: #FEF2F2; color: #DC2626; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0\" style-hover=\"background: #FEE2E2\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <button onclick=\"{{ onFeAddOption }}\" style=\"height: 32px; padding: 0 12px; background: #F1F5F9; color: #475569; border: 1px dashed #CBD5E1; border-radius: 6px; font-size: 0.8125rem; cursor: pointer; margin-top: 4px\" style-hover=\"background: #E2E8F0\">+ Add Option<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 24px 24px; display: flex; gap: 12px; justify-content: flex-end; border-top: 1px solid #F1F5F9; margin-top: 8px\">\n          <button onclick=\"{{ onCloseFieldEditor }}\" style=\"height: 40px; padding: 0 20px; border: 1px solid #D1D5DB; background: #FFF; border-radius: 8px; font-size: 0.875rem; color: #64748B; cursor: pointer\" style-hover=\"background: #F9FAFB\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onSaveField }}\" style=\"height: 40px; padding: 0 20px; border: none; background: #0055B8; border-radius: 8px; font-size: 0.875rem; color: #FFF; cursor: pointer; font-weight: 500\" style-hover=\"background: #004494\">Save Field<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== CLEAR CONFIRM ===== -->\n  <sc-if value=\"{{ showClearConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease\" onclick=\"{{ onCloseClearConfirm }}\">\n      <div style=\"background: #FFF; border-radius: 16px; padding: 32px; width: 400px; max-width: 90vw; text-align: center\" onclick=\"{{ stopProp }}\">\n        <div style=\"width: 56px; height: 56px; background: #FEF2F2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#DC2626\" stroke-width=\"2\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-size: 1.125rem; font-weight: 700; color: #1A1A2E; margin-bottom: 8px\">Delete All Records?<\u002Fdiv>\n        <div style=\"font-size: 0.875rem; color: #64748B; margin-bottom: 20px; line-height: 1.5\">Type <strong>DELETE<\u002Fstrong> to confirm.<\u002Fdiv>\n        <input type=\"text\" value=\"{{ clearConfirmValue }}\" oninput=\"{{ onClearConfirmInput }}\" placeholder=\"Type DELETE\" style=\"width: 100%; height: 44px; padding: 0 14px; border: 2px solid #D1D5DB; border-radius: 8px; font-size: 1rem; text-align: center; outline: none; margin-bottom: 16px\" style-focus=\"border-color: #DC2626\">\n        <div style=\"display: flex; gap: 12px\">\n          <button onclick=\"{{ onCloseClearConfirm }}\" style=\"flex: 1; height: 44px; border: 1px solid #D1D5DB; background: #FFF; border-radius: 8px; font-size: 0.9375rem; color: #64748B; cursor: pointer\" style-hover=\"background: #F9FAFB\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onConfirmClear }}\" disabled=\"{{ clearConfirmDisabled }}\" style=\"flex: 1; height: 44px; border: none; background: #DC2626; border-radius: 8px; font-size: 0.9375rem; color: #FFF; cursor: pointer; font-weight: 500; opacity: {{ clearConfirmOpacity }}\" style-hover=\"background: #B91C1C\">Delete All<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PHOTO LIGHTBOX ===== -->\n  <sc-if value=\"{{ showPhotoLightbox }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.15s ease; padding: 20px; cursor: pointer\" onclick=\"{{ onClosePhotoLightbox }}\">\n      {{ lightboxPhotoImg }}\n      <button style=\"position: absolute; top: 20px; right: 20px; width: 44px; height: 44px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #FFF; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center\" style-hover=\"background: rgba(255,255,255,0.3)\">×<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TOAST ===== -->\n  <sc-if value=\"{{ showToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #1E293B; color: #FFF; padding: 12px 24px; border-radius: 10px; font-size: 0.9375rem; font-weight: 500; z-index: 2000; animation: fadeIn 0.2s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-width: 90vw; text-align: center\">{{ toastMessage }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  DB_NAME = 'ExhibitionFormDB';\n  DB_VERSION = 1;\n\n  state = {\n    screen: 'langSelect', language: 'en',\n    showPinDialog: false, pinValue: '', pinError: false,\n    adminTab: 'fields',\n    pin: '0000', deviceName: '',\n    gdprEn: 'I consent to the organizer collecting and storing my contact information for the purpose of business follow-up. My data will not be shared with third parties.',\n    gdprZh: '本人同意主辦單位蒐集並儲存本人之聯絡資訊，用於後續商業聯繫。本人資料不會提供予第三方。',\n    customerFields: [], staffFields: [],\n    formValues: {}, formErrors: {}, gdprChecked: false, gdprError: false, selectedCountryCode: '+886',\n    staffValues: {}, currentRecordId: null,\n    records: [],\n    showFieldEditor: false, fieldEditorMode: 'add', fieldEditorTarget: 'customer', editingFieldId: null,\n    feNameEn: '', feNameZh: '', feType: 'text', feRequired: false, feOptions: [],\n    showClearConfirm: false, clearConfirmValue: '',\n    showToast: false, toastMessage: '',\n    // Card photo\n    cardPhotoPreviewSrc: null,\n    cardPhotoBase64: null,\n    // Photo lightbox\n    showPhotoLightbox: false, lightboxPhotoSrc: '',\n    // Export\n    exporting: false,\n    dbReady: false,\n  };\n\n  db = null;\n\n  getDefaultCustomerFields() {\n    return [\n      { id: 'name', nameEn: 'Name', nameZh: '姓名', type: 'text', required: true, isCore: true, order: 0, options: [] },\n      { id: 'company', nameEn: 'Company', nameZh: '公司', type: 'text', required: true, isCore: true, order: 1, options: [] },\n      { id: 'email', nameEn: 'Email', nameZh: '電子信箱', type: 'email', required: true, isCore: true, order: 2, options: [] },\n      { id: 'phone', nameEn: 'Phone', nameZh: '電話（含國碼）', type: 'tel', required: false, isCore: true, order: 3, options: [] },\n      { id: 'inquiry_type', nameEn: 'Inquiry Type', nameZh: '洽談事由', type: 'checkbox-group', required: false, isCore: true, order: 4, options: [\n        { en: 'Request Quote', zh: '索取報價' }, { en: 'Sample Required', zh: '樣品需求' },\n        { en: 'Customization / OEM', zh: '客製化需求' }, { en: 'Become a Distributor', zh: '尋求代理' },\n      ]},\n    ];\n  }\n  getDefaultStaffFields() {\n    return [\n      { id: 'potential', nameEn: 'Potential', nameZh: '潛力評級', type: 'select', required: false, order: 0, options: [{ en: 'A', zh: 'A' },{ en: 'B', zh: 'B' },{ en: 'C', zh: 'C' }]},\n      { id: 'product_interest', nameEn: 'Product of Interest', nameZh: '感興趣產品', type: 'checkbox-group', required: false, order: 1, options: [] },\n      { id: 'notes', nameEn: 'Notes', nameZh: '備註', type: 'textarea', required: false, order: 2, options: [] },\n    ];\n  }\n\n  async componentDidMount() { await this.initDB(); await this.loadAllData(); this.setState({ dbReady: true }); }\n\n  initDB() {\n    return new Promise((resolve, reject) => {\n      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);\n      req.onerror = () => reject(req.error);\n      req.onsuccess = () => { this.db = req.result; resolve(); };\n      req.onupgradeneeded = (e) => {\n        const db = e.target.result;\n        if (!db.objectStoreNames.contains('config')) db.createObjectStore('config', { keyPath: 'key' });\n        if (!db.objectStoreNames.contains('records')) db.createObjectStore('records', { keyPath: 'id' });\n        if (!db.objectStoreNames.contains('fieldDefinitions')) db.createObjectStore('fieldDefinitions', { keyPath: 'key' });\n      };\n    });\n  }\n  dbGet(store, key) { return new Promise((res, rej) => { const tx = this.db.transaction(store, 'readonly'); const r = tx.objectStore(store).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }\n  dbPut(store, value) { return new Promise((res, rej) => { const tx = this.db.transaction(store, 'readwrite'); const r = tx.objectStore(store).put(value); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }\n  dbGetAll(store) { return new Promise((res, rej) => { const tx = this.db.transaction(store, 'readonly'); const r = tx.objectStore(store).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }\n  dbDelete(store, key) { return new Promise((res, rej) => { const tx = this.db.transaction(store, 'readwrite'); const r = tx.objectStore(store).delete(key); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }\n  dbClear(store) { return new Promise((res, rej) => { const tx = this.db.transaction(store, 'readwrite'); const r = tx.objectStore(store).clear(); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }\n\n  async loadAllData() {\n    const [pinD, devD, gdprEnD, gdprZhD, custD, staffD] = await Promise.all([\n      this.dbGet('config','pin'), this.dbGet('config','deviceName'),\n      this.dbGet('config','gdprEn'), this.dbGet('config','gdprZh'),\n      this.dbGet('fieldDefinitions','customerFields'), this.dbGet('fieldDefinitions','staffFields'),\n    ]);\n    const records = await this.dbGetAll('records');\n    const defaultDev = 'Device-' + Math.random().toString(36).substr(2,6).toUpperCase();\n    this.setState({\n      pin: pinD?.value ?? '0000', deviceName: devD?.value ?? defaultDev,\n      gdprEn: gdprEnD?.value ?? this.state.gdprEn, gdprZh: gdprZhD?.value ?? this.state.gdprZh,\n      customerFields: custD?.value ?? this.getDefaultCustomerFields(),\n      staffFields: staffD?.value ?? this.getDefaultStaffFields(),\n      records: records.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)),\n    });\n    if (!custD) await this.dbPut('fieldDefinitions', { key: 'customerFields', value: this.getDefaultCustomerFields() });\n    if (!staffD) await this.dbPut('fieldDefinitions', { key: 'staffFields', value: this.getDefaultStaffFields() });\n    if (!devD) await this.dbPut('config', { key: 'deviceName', value: defaultDev });\n  }\n\n  saveConfig(k, v) { return this.dbPut('config', { key: k, value: v }); }\n  saveFieldDefs(k, v) { return this.dbPut('fieldDefinitions', { key: k, value: v }); }\n  showToastMsg(m) { this.setState({ showToast: true, toastMessage: m }); setTimeout(() => this.setState({ showToast: false }), 2000); }\n  genId() { return 'f_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,6); }\n  genUUID() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); }); }\n\n  getCountryCodes() {\n    return [\n      {value:'+886',label:'+886 TW'},{value:'+86',label:'+86 CN'},{value:'+1',label:'+1 US/CA'},\n      {value:'+44',label:'+44 UK'},{value:'+49',label:'+49 DE'},{value:'+81',label:'+81 JP'},\n      {value:'+82',label:'+82 KR'},{value:'+66',label:'+66 TH'},{value:'+91',label:'+91 IN'},\n      {value:'+7',label:'+7 RU'},{value:'+20',label:'+20 EG'},{value:'+27',label:'+27 ZA'},\n      {value:'+30',label:'+30 GR'},{value:'+31',label:'+31 NL'},{value:'+33',label:'+33 FR'},\n      {value:'+34',label:'+34 ES'},{value:'+39',label:'+39 IT'},{value:'+41',label:'+41 CH'},\n      {value:'+43',label:'+43 AT'},{value:'+46',label:'+46 SE'},{value:'+47',label:'+47 NO'},\n      {value:'+48',label:'+48 PL'},{value:'+52',label:'+52 MX'},{value:'+55',label:'+55 BR'},\n      {value:'+60',label:'+60 MY'},{value:'+61',label:'+61 AU'},{value:'+62',label:'+62 ID'},\n      {value:'+63',label:'+63 PH'},{value:'+64',label:'+64 NZ'},{value:'+65',label:'+65 SG'},\n      {value:'+84',label:'+84 VN'},{value:'+90',label:'+90 TR'},{value:'+852',label:'+852 HK'},\n      {value:'+853',label:'+853 MO'},{value:'+971',label:'+971 UAE'},\n    ];\n  }\n\n  // ===== CARD PHOTO =====\n  compressImage(file) {\n    return new Promise((resolve) => {\n      const reader = new FileReader();\n      reader.onload = (e) => {\n        const img = new Image();\n        img.onload = () => {\n          const MAX = 1600;\n          let w = img.width, h = img.height;\n          if (w > MAX || h > MAX) {\n            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }\n            else { w = Math.round(w * MAX / h); h = MAX; }\n          }\n          const canvas = document.createElement('canvas');\n          canvas.width = w; canvas.height = h;\n          const ctx = canvas.getContext('2d');\n          ctx.drawImage(img, 0, 0, w, h);\n          const dataUrl = canvas.toDataURL('image/jpeg', 0.8);\n          resolve(dataUrl);\n        };\n        img.src = e.target.result;\n      };\n      reader.readAsDataURL(file);\n    });\n  }\n\n  async handleCardFileSelected(e) {\n    const file = e.target.files?.[0];\n    if (!file) return;\n    const dataUrl = await this.compressImage(file);\n    this.setState({ cardPhotoPreviewSrc: dataUrl, cardPhotoBase64: dataUrl });\n  }\n\n  async confirmPhoto() {\n    const { currentRecordId, cardPhotoBase64, records } = this.state;\n    const updated = records.map(r => r.id === currentRecordId ? { ...r, cardPhoto: cardPhotoBase64 } : r);\n    const record = updated.find(r => r.id === currentRecordId);\n    if (record) await this.dbPut('records', record);\n    this.setState({ records: updated, screen: 'staffNotes', cardPhotoPreviewSrc: null, cardPhotoBase64: null });\n  }\n\n  // ===== EXPORT XLSX+ZIP =====\n  sanitizeFilename(s) { return String(s || '').replace(/[\\\\/:*?\"<>|]/g, '_').replace(/\\s+/g, '_').substring(0, 50); }\n\n  async exportData() {\n    if (!window.ExportLib) { this.showToastMsg('Export library not loaded'); return; }\n    this.setState({ exporting: true });\n    this.showToastMsg('Exporting...');\n\n    try {\n      await new Promise(r => setTimeout(r, 50)); // Let UI update\n      const { customerFields, staffFields, records } = this.state;\n      const custSorted = [...customerFields].sort((a,b) => a.order - b.order);\n      const staffSorted = [...staffFields].sort((a,b) => a.order - b.order);\n      const allFields = [...custSorted, ...staffSorted];\n\n      // Find phone field indices for text formatting\n      const textCols = new Set();\n      allFields.forEach((f, i) => { if (f.type === 'tel') textCols.add(i + 4); }); // offset by ID,Timestamp,Device,Language\n\n      // Build Records sheet\n      const headers = ['ID', 'Timestamp', 'Device', 'Language', ...allFields.map(f => f.nameEn), 'GDPR Consent', 'Card Photo Filename'];\n      const rows = [];\n      const photoFiles = [];\n\n      records.forEach((r, idx) => {\n        const num = String(idx + 1).padStart(3, '0');\n        const company = this.sanitizeFilename(r.customerFields?.company);\n        const name = this.sanitizeFilename(r.customerFields?.name);\n        const photoFn = r.cardPhoto ? `${num}_${company}_${name}.jpg` : '';\n\n        if (r.cardPhoto) {\n          photoFiles.push({ name: 'cards/' + photoFn, data: window.ExportLib.base64ToUint8Array(r.cardPhoto) });\n        }\n\n        const row = [\n          r.id, r.timestamp, r.device || '', r.language || '',\n          ...allFields.map(f => {\n            const isCust = custSorted.find(cf => cf.id === f.id);\n            const val = isCust ? r.customerFields?.[f.id] : r.staffFields?.[f.id];\n            if (Array.isArray(val)) return val.join('; ');\n            return val ?? '';\n          }),\n          r.gdprConsent ? 'Yes' : 'No',\n          photoFn,\n        ];\n        rows.push(row);\n      });\n\n      // Build Field Definitions sheet\n      const fdHeaders = ['Field ID', 'Name (EN)', 'Name (ZH)', 'Type', 'Required', 'Category', 'Options (EN)', 'Options (ZH)'];\n      const fdRows = [];\n      custSorted.forEach(f => {\n        fdRows.push([f.id, f.nameEn, f.nameZh, f.type, f.required ? 'Yes' : 'No', 'Customer',\n          (f.options||[]).map(o=>o.en).join('; '), (f.options||[]).map(o=>o.zh).join('; ')]);\n      });\n      staffSorted.forEach(f => {\n        fdRows.push([f.id, f.nameEn, f.nameZh, f.type, f.required ? 'Yes' : 'No', 'Staff',\n          (f.options||[]).map(o=>o.en).join('; '), (f.options||[]).map(o=>o.zh).join('; ')]);\n      });\n\n      // Create XLSX\n      const xlsxData = window.ExportLib.createXLSX([\n        { name: 'Records', headers, rows, textCols },\n        { name: 'Field Definitions', headers: fdHeaders, rows: fdRows },\n      ]);\n\n      // Create outer ZIP\n      const zipFiles = [{ name: 'records.xlsx', data: xlsxData }, ...photoFiles];\n      const zipData = window.ExportLib.createZIP(zipFiles);\n\n      // Trigger download\n      const now = new Date();\n      const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0')\n        + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');\n      const blob = new Blob([zipData], { type: 'application/zip' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = `export_${ts}.zip`; a.click();\n      URL.revokeObjectURL(url);\n      this.showToastMsg('Export complete!');\n    } catch (err) {\n      console.error('Export error:', err);\n      this.showToastMsg('Export failed: ' + err.message);\n    }\n    this.setState({ exporting: false });\n  }\n\n  // ===== FORM SUBMIT =====\n  submitForm() {\n    const { customerFields, formValues, gdprChecked, language, selectedCountryCode } = this.state;\n    const errors = {};\n    const lang = language === 'zh-TW' ? 'zh' : 'en';\n    for (const f of customerFields) {\n      if (f.required) {\n        const val = formValues[f.id];\n        if (!val || (typeof val === 'string' && !val.trim()) || (Array.isArray(val) && val.length === 0))\n          errors[f.id] = lang === 'en' ? 'This field is required.' : '此欄位為必填。';\n      }\n      if (f.type === 'email' && formValues[f.id]) {\n        const v = formValues[f.id].trim();\n        if (v && !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v))\n          errors[f.id] = lang === 'en' ? 'Please enter a valid email.' : '請輸入有效的電子信箱。';\n      }\n    }\n    if (!gdprChecked) { this.setState({ formErrors: errors, gdprError: true }); return; }\n    if (Object.keys(errors).length > 0) { this.setState({ formErrors: errors }); return; }\n\n    const vals = { ...formValues };\n    const phoneF = customerFields.find(f => f.type === 'tel');\n    if (phoneF && vals[phoneF.id]) vals[phoneF.id] = selectedCountryCode + ' ' + vals[phoneF.id];\n\n    const record = { id: this.genUUID(), timestamp: new Date().toISOString(), device: this.state.deviceName,\n      language: language === 'zh-TW' ? 'zh-TW' : 'en', customerFields: vals, staffFields: {}, gdprConsent: true, cardPhoto: null };\n\n    this.dbPut('records', record).then(() => {\n      this.setState({ records: [record, ...this.state.records], currentRecordId: record.id, screen: 'thankYou', staffValues: {} });\n      this._timer = setTimeout(() => { if (this.state.screen === 'thankYou') this.setState({ screen: 'cardPhoto', cardPhotoPreviewSrc: null, cardPhotoBase64: null }); }, 2000);\n    });\n  }\n\n  async saveStaffNotes() {\n    const { currentRecordId, staffValues, records } = this.state;\n    const updated = records.map(r => r.id === currentRecordId ? { ...r, staffFields: { ...staffValues } } : r);\n    const rec = updated.find(r => r.id === currentRecordId);\n    if (rec) await this.dbPut('records', rec);\n    this.setState({ records: updated, screen: 'langSelect', staffValues: {}, currentRecordId: null });\n    this.showToastMsg('Saved!');\n  }\n\n  submitPin() {\n    if (this.state.pinValue === this.state.pin) this.setState({ showPinDialog: false, pinValue: '', pinError: false, screen: 'admin', adminTab: 'fields' });\n    else this.setState({ pinError: true });\n  }\n\n  openFieldEditor(mode, target, field) {\n    this.setState({ showFieldEditor: true, fieldEditorMode: mode, fieldEditorTarget: target, editingFieldId: field?.id ?? null,\n      feNameEn: field?.nameEn ?? '', feNameZh: field?.nameZh ?? '', feType: field?.type ?? 'text',\n      feRequired: field?.required ?? false, feOptions: field?.options ? field.options.map(o => ({...o})) : [] });\n  }\n\n  async saveField() {\n    const { fieldEditorMode, fieldEditorTarget, editingFieldId, feNameEn, feNameZh, feType, feRequired, feOptions } = this.state;\n    if (!feNameEn.trim()) { this.showToastMsg('English name is required'); return; }\n    const sk = fieldEditorTarget === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = [...this.state[sk]];\n    const opts = feOptions.filter(o => o.en.trim() || o.zh.trim()).map(o => ({ en: o.en.trim(), zh: o.zh.trim() || o.en.trim() }));\n    if (fieldEditorMode === 'add') {\n      const mx = fields.length > 0 ? Math.max(...fields.map(f => f.order)) : -1;\n      fields.push({ id: this.genId(), nameEn: feNameEn.trim(), nameZh: feNameZh.trim() || feNameEn.trim(), type: feType, required: feRequired, isCore: false, order: mx + 1, options: opts });\n    } else {\n      fields = fields.map(f => f.id === editingFieldId ? { ...f, nameEn: feNameEn.trim(), nameZh: feNameZh.trim() || feNameEn.trim(), type: feType, required: feRequired, options: opts } : f);\n    }\n    await this.saveFieldDefs(sk, fields);\n    this.setState({ [sk]: fields, showFieldEditor: false });\n    this.showToastMsg(fieldEditorMode === 'add' ? 'Field added' : 'Field updated');\n  }\n\n  async deleteField(target, id) {\n    const sk = target === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = this.state[sk].filter(f => f.id !== id).sort((a,b) => a.order - b.order).map((f,i) => ({...f, order: i}));\n    await this.saveFieldDefs(sk, fields);\n    this.setState({ [sk]: fields }); this.showToastMsg('Field deleted');\n  }\n\n  async moveField(target, id, dir) {\n    const sk = target === 'customer' ? 'customerFields' : 'staffFields';\n    let fields = [...this.state[sk]].sort((a,b) => a.order - b.order);\n    const idx = fields.findIndex(f => f.id === id); if (idx < 0) return;\n    const ni = idx + dir; if (ni < 0 || ni >= fields.length) return;\n    [fields[idx], fields[ni]] = [fields[ni], fields[idx]];\n    fields = fields.map((f,i) => ({...f, order: i}));\n    await this.saveFieldDefs(sk, fields);\n    this.setState({ [sk]: fields });\n  }\n\n  async deleteRecord(id) { await this.dbDelete('records', id); this.setState({ records: this.state.records.filter(r => r.id !== id) }); this.showToastMsg('Record deleted'); }\n\n  async clearAllRecords() {\n    if (this.state.clearConfirmValue !== 'DELETE') return;\n    await this.dbClear('records');\n    this.setState({ records: [], showClearConfirm: false, clearConfirmValue: '' }); this.showToastMsg('All records cleared');\n  }\n\n  async saveSettings() {\n    await Promise.all([this.saveConfig('pin', this.state.pin), this.saveConfig('deviceName', this.state.deviceName),\n      this.saveConfig('gdprEn', this.state.gdprEn), this.saveConfig('gdprZh', this.state.gdprZh)]);\n    this.showToastMsg('Settings saved');\n  }\n\n  renderVals() {\n    const { screen, language, showPinDialog, pinValue, pinError, adminTab } = this.state;\n    const { customerFields, staffFields, records, formValues, formErrors, gdprChecked, gdprError, staffValues, selectedCountryCode } = this.state;\n    const lang = language;\n\n    const showLangSelect = screen === 'langSelect';\n    const showCustomerForm = screen === 'customerForm';\n    const showThankYou = screen === 'thankYou';\n    const showCardPhoto = screen === 'cardPhoto';\n    const showStaffNotes = screen === 'staffNotes';\n    const showAdmin = screen === 'admin';\n\n    const showAdminFields = showAdmin && adminTab === 'fields';\n    const showAdminStaffFields = showAdmin && adminTab === 'staffFields';\n    const showAdminRecords = showAdmin && adminTab === 'records';\n    const showAdminSettings = showAdmin && adminTab === 'settings';\n\n    const adminTabs = [\n      { label: 'Customer Fields', onClick: () => this.setState({ adminTab: 'fields' }), color: adminTab === 'fields' ? '#0055B8' : '#64748B', borderColor: adminTab === 'fields' ? '#0055B8' : 'transparent' },\n      { label: 'Staff Fields', onClick: () => this.setState({ adminTab: 'staffFields' }), color: adminTab === 'staffFields' ? '#0055B8' : '#64748B', borderColor: adminTab === 'staffFields' ? '#0055B8' : 'transparent' },\n      { label: 'Records', onClick: () => this.setState({ adminTab: 'records' }), color: adminTab === 'records' ? '#0055B8' : '#64748B', borderColor: adminTab === 'records' ? '#0055B8' : 'transparent' },\n      { label: 'Settings', onClick: () => this.setState({ adminTab: 'settings' }), color: adminTab === 'settings' ? '#0055B8' : '#64748B', borderColor: adminTab === 'settings' ? '#0055B8' : 'transparent' },\n    ];\n\n    const isZh = lang === 'zh-TW';\n    const formTitle = isZh ? '客戶登記表' : 'Registration Form';\n    const backLabel = isZh ? '← 返回' : '← Back';\n    const submitLabel = isZh ? '送出' : 'Submit';\n    const thankYouTitle = isZh ? '感謝您的填寫！' : 'Thank you!';\n    const thankYouSub = isZh ? '您的資料已成功送出。' : 'Your information has been submitted.';\n    const continueLabel = isZh ? '繼續 →' : 'Continue →';\n    const gdprText = isZh ? this.state.gdprZh : this.state.gdprEn;\n    const gdprErrorMsg = isZh ? '您必須同意資料蒐集條款。' : 'You must agree to the data collection terms.';\n\n    // Card photo labels\n    const cardPhotoTitle = isZh ? '拍攝名片' : 'Scan Business Card';\n    const captureLabel = isZh ? '拍攝' : 'Capture';\n    const skipLabel = isZh ? '跳過' : 'Skip';\n    const retakeLabel = isZh ? '重拍' : 'Retake';\n    const confirmLabel = isZh ? '確認' : 'Confirm';\n\n    const currentRec = records.find(r => r.id === this.state.currentRecordId);\n    const cardPhotoCustomerName = currentRec?.customerFields?.name ?? '';\n    const cardPhotoCustomerCompany = currentRec?.customerFields?.company ?? '';\n    const showCaptureButtons = !this.state.cardPhotoPreviewSrc;\n    const showPhotoPreview = !!this.state.cardPhotoPreviewSrc;\n    const cardPhotoPreviewImg = this.state.cardPhotoPreviewSrc\n      ? React.createElement('img', { src: this.state.cardPhotoPreviewSrc, style: { width: '100%', maxHeight: '320px', objectFit: 'contain', display: 'block' } })\n      : null;\n\n    // Customer form fields\n    const sorted = [...customerFields].sort((a,b) => a.order - b.order);\n    const customerFormFields = sorted.map(f => {\n      const label = isZh ? f.nameZh : f.nameEn;\n      const value = formValues[f.id] ?? '';\n      const isText = f.type === 'text' || f.type === 'email';\n      const isTel = f.type === 'tel';\n      const isTextarea = f.type === 'textarea';\n      const isSelect = f.type === 'select';\n      const isCheckboxGroup = f.type === 'checkbox-group';\n      const inputType = f.type === 'email' ? 'email' : 'text';\n      const placeholder = isSelect ? (isZh ? '-- 請選擇 --' : '-- Select --') : (isZh ? `請輸入${f.nameZh}` : `Enter ${f.nameEn.toLowerCase()}`);\n      const options = (f.options||[]).map(o => ({ value: o.en, label: isZh ? o.zh : o.en }));\n      const checked = Array.isArray(formValues[f.id]) ? formValues[f.id] : [];\n      const checkboxItems = (f.options||[]).map(o => {\n        const c = checked.includes(o.en);\n        return { label: isZh ? o.zh : o.en, checked: c, bgColor: c ? '#F0F6FF' : '#FFFFFF', borderColor: c ? '#0055B8' : '#D1D5DB', textColor: c ? '#0055B8' : '#334155',\n          onChange: () => { const cur = Array.isArray(formValues[f.id]) ? [...formValues[f.id]] : []; const idx = cur.indexOf(o.en); if (idx >= 0) cur.splice(idx,1); else cur.push(o.en); this.setState({ formValues: {...formValues, [f.id]: cur}, formErrors: {...formErrors, [f.id]: null} }); }};\n      });\n      return { label, required: f.required, isText, isTel, isTextarea, isSelect, isCheckboxGroup, inputType, placeholder, value, options, checkboxItems,\n        countryCode: isTel ? selectedCountryCode : undefined,\n        onCountryCodeChange: isTel ? (e) => this.setState({ selectedCountryCode: e.target.value }) : undefined,\n        error: !!formErrors[f.id], errorMsg: formErrors[f.id] || '',\n        onInput: (e) => this.setState({ formValues: {...this.state.formValues, [f.id]: e.target.value}, formErrors: {...this.state.formErrors, [f.id]: null} }),\n      };\n    });\n\n    // Staff form\n    const staffSorted = [...staffFields].sort((a,b) => a.order - b.order);\n    const staffCustomerName = currentRec?.customerFields?.name ?? '';\n    const staffCustomerCompany = currentRec?.customerFields?.company ?? '';\n    const staffFormFields = staffSorted.map(f => {\n      const label = f.nameEn + ' / ' + f.nameZh;\n      const value = staffValues[f.id] ?? '';\n      const isText = f.type === 'text' || f.type === 'email';\n      const isTextarea = f.type === 'textarea';\n      const isSelect = f.type === 'select';\n      const isCheckboxGroup = f.type === 'checkbox-group';\n      const options = (f.options||[]).map(o => ({ value: o.en, label: o.en + (o.zh && o.zh !== o.en ? ' / ' + o.zh : '') }));\n      const checked = Array.isArray(staffValues[f.id]) ? staffValues[f.id] : [];\n      const checkboxItems = (f.options||[]).map(o => {\n        const c = checked.includes(o.en);\n        return { label: o.en + (o.zh && o.zh !== o.en ? ' / ' + o.zh : ''), checked: c,\n          bgColor: c ? '#F1F5F9' : '#FFFFFF', borderColor: c ? '#334155' : '#D1D5DB', textColor: c ? '#1E293B' : '#334155',\n          onChange: () => { const cur = Array.isArray(staffValues[f.id]) ? [...staffValues[f.id]] : []; const idx = cur.indexOf(o.en); if (idx>=0) cur.splice(idx,1); else cur.push(o.en); this.setState({ staffValues: {...this.state.staffValues, [f.id]: cur} }); }};\n      });\n      return { label, isText, isTextarea, isSelect, isCheckboxGroup, placeholder: '', value, options, checkboxItems,\n        onInput: (e) => this.setState({ staffValues: {...this.state.staffValues, [f.id]: e.target.value} }) };\n    });\n\n    // Admin field lists\n    const mkAdminFields = (fields, target) => {\n      return fields.sort((a,b) => a.order - b.order).map((f,i,arr) => ({\n        nameEn: f.nameEn, nameZh: f.nameZh, type: f.type, required: f.required, isCore: f.isCore||false, canDelete: !f.isCore,\n        hasOptions: f.type === 'select' || f.type === 'checkbox-group',\n        optionsSummary: (f.options||[]).map(o => o.en).join(', ') || '(none)',\n        onMoveUp: () => { if (i > 0) this.moveField(target, f.id, -1); },\n        onMoveDown: () => { if (i < arr.length-1) this.moveField(target, f.id, 1); },\n        onEdit: () => this.openFieldEditor('edit', target, f),\n        onDelete: () => this.deleteField(target, f.id),\n      }));\n    };\n\n    // Records\n    const recordCount = records.length;\n    const photoCount = records.filter(r => r.cardPhoto).length;\n    const recordStats = `${recordCount} record${recordCount !== 1 ? 's' : ''} collected, ${photoCount} with business card photo${photoCount !== 1 ? 's' : ''}`;\n    const allF = [...customerFields.sort((a,b)=>a.order-b.order), ...staffFields.sort((a,b)=>a.order-b.order)];\n    const recordHeaders = ['#', 'Time', 'Device', 'Lang', ...allF.map(f => f.nameEn), 'Card'];\n    const recordRows = records.map((r,i) => {\n      const cells = [\n        String(i+1), new Date(r.timestamp).toLocaleString(), r.device||'', r.language||'',\n        ...allF.map(f => {\n          const v = customerFields.find(cf=>cf.id===f.id) ? r.customerFields?.[f.id] : r.staffFields?.[f.id];\n          return Array.isArray(v) ? v.join(', ') : (v ?? '');\n        }),\n        r.cardPhoto ? '📷' : '—',\n      ];\n      return { cells, hasPhoto: !!r.cardPhoto,\n        onViewPhoto: () => this.setState({ showPhotoLightbox: true, lightboxPhotoSrc: r.cardPhoto }),\n        onDelete: () => this.deleteRecord(r.id) };\n    });\n\n    // Field editor\n    const { showFieldEditor, fieldEditorMode, feNameEn, feNameZh, feType, feRequired, feOptions: feOpts } = this.state;\n    const feShowOptions = feType === 'select' || feType === 'checkbox-group';\n    const feOptions = feOpts.map((o,i) => ({\n      en: o.en, zh: o.zh,\n      onEnChange: (e) => { const opts = [...this.state.feOptions]; opts[i] = {...opts[i], en: e.target.value}; this.setState({feOptions: opts}); },\n      onZhChange: (e) => { const opts = [...this.state.feOptions]; opts[i] = {...opts[i], zh: e.target.value}; this.setState({feOptions: opts}); },\n      onRemove: () => { const opts = [...this.state.feOptions]; opts.splice(i,1); this.setState({feOptions: opts}); },\n    }));\n\n    const { showClearConfirm, clearConfirmValue } = this.state;\n\n    return {\n      showLangSelect, showCustomerForm, showThankYou, showCardPhoto, showStaffNotes, showAdmin,\n      showPinDialog, pinValue, pinError,\n      onOpenPinDialog: () => this.setState({ showPinDialog: true, pinValue: '', pinError: false }),\n      onClosePinDialog: () => this.setState({ showPinDialog: false, pinValue: '', pinError: false }),\n      onPinInput: (e) => this.setState({ pinValue: e.target.value.replace(/\\D/g,'').slice(0,4), pinError: false }),\n      onPinKeyDown: (e) => { if (e.key === 'Enter') this.submitPin(); },\n      onSubmitPin: () => this.submitPin(),\n      stopProp: (e) => e.stopPropagation(),\n      onSelectEnglish: () => this.setState({ screen: 'customerForm', language: 'en', formValues: {}, formErrors: {}, gdprChecked: false, gdprError: false, selectedCountryCode: '+1' }),\n      onSelectChinese: () => this.setState({ screen: 'customerForm', language: 'zh-TW', formValues: {}, formErrors: {}, gdprChecked: false, gdprError: false, selectedCountryCode: '+886' }),\n      onBackToLang: () => this.setState({ screen: 'langSelect', formValues: {}, formErrors: {} }),\n      formTitle, backLabel, submitLabel, customerFormFields, countryCodes: this.getCountryCodes(),\n      gdprText, gdprChecked, gdprError, gdprErrorMsg,\n      onGdprToggle: () => this.setState({ gdprChecked: !this.state.gdprChecked, gdprError: false }),\n      onSubmitForm: () => this.submitForm(),\n      thankYouTitle, thankYouSub, continueLabel,\n      onGoToCardPhoto: () => this.setState({ screen: 'cardPhoto', cardPhotoPreviewSrc: null, cardPhotoBase64: null }),\n      // Card photo\n      cardPhotoTitle, captureLabel, skipLabel, retakeLabel, confirmLabel,\n      cardPhotoCustomerName, cardPhotoCustomerCompany,\n      showCaptureButtons, showPhotoPreview, cardPhotoPreviewImg,\n      onCardFileSelected: (e) => this.handleCardFileSelected(e),\n      onSkipCardPhoto: () => this.setState({ screen: 'staffNotes', cardPhotoPreviewSrc: null, cardPhotoBase64: null }),\n      onConfirmPhoto: () => this.confirmPhoto(),\n      // Staff\n      staffCustomerName, staffCustomerCompany, staffFormFields,\n      onSaveStaffNotes: () => this.saveStaffNotes(),\n      onSkipStaffNotes: () => this.setState({ screen: 'langSelect', staffValues: {}, currentRecordId: null }),\n      // Admin\n      adminTabs, showAdminFields, showAdminStaffFields, showAdminRecords, showAdminSettings,\n      onExitAdmin: () => this.setState({ screen: 'langSelect' }),\n      adminCustomerFields: mkAdminFields([...customerFields], 'customer'),\n      adminStaffFields: mkAdminFields([...staffFields], 'staff'),\n      onAddCustomerField: () => this.openFieldEditor('add', 'customer'),\n      onAddStaffField: () => this.openFieldEditor('add', 'staff'),\n      // Records\n      recordCount, recordStats, hasRecords: recordCount > 0, noRecords: recordCount === 0,\n      recordHeaders, recordRows,\n      onExportData: () => this.exportData(),\n      exporting: this.state.exporting,\n      exportBtnLabel: this.state.exporting ? 'Exporting...' : 'Export Data',\n      exportBtnOpacity: this.state.exporting ? '0.6' : '1',\n      onClearAllData: () => this.setState({ showClearConfirm: true, clearConfirmValue: '' }),\n      // Settings\n      deviceName: this.state.deviceName, adminPin: this.state.pin, gdprEn: this.state.gdprEn, gdprZh: this.state.gdprZh,\n      onDeviceNameChange: (e) => this.setState({ deviceName: e.target.value }),\n      onPinChange: (e) => this.setState({ pin: e.target.value.replace(/\\D/g,'').slice(0,4) }),\n      onGdprEnChange: (e) => this.setState({ gdprEn: e.target.value }),\n      onGdprZhChange: (e) => this.setState({ gdprZh: e.target.value }),\n      onSaveSettings: () => this.saveSettings(),\n      // Field editor\n      showFieldEditor, fieldEditorTitle: fieldEditorMode === 'add' ? 'Add Field' : 'Edit Field',\n      feNameEn, feNameZh, feType, feRequired, feShowOptions, feOptions,\n      onFeNameEnChange: (e) => this.setState({ feNameEn: e.target.value }),\n      onFeNameZhChange: (e) => this.setState({ feNameZh: e.target.value }),\n      onFeTypeChange: (e) => this.setState({ feType: e.target.value }),\n      onFeRequiredChange: () => this.setState({ feRequired: !this.state.feRequired }),\n      onFeAddOption: () => this.setState({ feOptions: [...this.state.feOptions, { en: '', zh: '' }] }),\n      onCloseFieldEditor: () => this.setState({ showFieldEditor: false }),\n      onSaveField: () => this.saveField(),\n      // Clear\n      showClearConfirm, clearConfirmValue,\n      clearConfirmDisabled: clearConfirmValue !== 'DELETE',\n      clearConfirmOpacity: clearConfirmValue !== 'DELETE' ? '0.4' : '1',\n      onClearConfirmInput: (e) => this.setState({ clearConfirmValue: e.target.value }),\n      onCloseClearConfirm: () => this.setState({ showClearConfirm: false }),\n      onConfirmClear: () => this.clearAllRecords(),\n      // Photo lightbox\n      showPhotoLightbox: this.state.showPhotoLightbox,\n      lightboxPhotoImg: this.state.lightboxPhotoSrc\n        ? React.createElement('img', { src: this.state.lightboxPhotoSrc, style: { maxWidth: '90vw', maxHeight: '90vh', objectFit: 'contain', borderRadius: '8px' } })\n        : null,\n      onClosePhotoLightbox: () => this.setState({ showPhotoLightbox: false }),\n      // Toast\n      showToast: this.state.showToast, toastMessage: this.state.toastMessage,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
